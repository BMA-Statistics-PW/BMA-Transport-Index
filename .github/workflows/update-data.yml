name: Update Transport Data

on:
  schedule:
    # ทุกวันจันทร์ เวลา 01:00 UTC (08:00 ICT)
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-transport-data
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh CSV data files
        run: |
          set -euo pipefail
          chmod +x scripts/update_transport_csv.sh
          ./scripts/update_transport_csv.sh

      - name: Run data sanity checks
        run: |
          set -euo pipefail
          node scripts/sanity_check.mjs

      - name: Commit and push if data changed
        run: |
          set -euo pipefail

          if git diff --quiet -- \
            data/ridership/transport_share.csv \
            data/ridership/transport_report.csv \
            data/ridership/meta.json; then
            echo "No data changes detected. Skipping commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/ridership/transport_share.csv \
            data/ridership/transport_report.csv \
            data/ridership/meta.json

          git commit -m "chore(data): weekly update transport CSV files"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
